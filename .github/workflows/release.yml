name: Release Skill Archives

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archives
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSIONED_PREFIX="lark-cli-extra-skills-${TAG}"
          STABLE_PREFIX="lark-cli-extra-skills"

          tar czf "${VERSIONED_PREFIX}.tar.gz" \
            lark-setup \
            lark-sheets-extra \
            lark-base-batch \
            lark-im-card \
            lark-workflow-meeting \
            lark-doc-convert

          zip -r "${VERSIONED_PREFIX}.zip" \
            lark-setup \
            lark-sheets-extra \
            lark-base-batch \
            lark-im-card \
            lark-workflow-meeting \
            lark-doc-convert

          cp "${VERSIONED_PREFIX}.tar.gz" "${STABLE_PREFIX}.tar.gz"
          cp "${VERSIONED_PREFIX}.zip" "${STABLE_PREFIX}.zip"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lark-cli-extra-skills-${{ github.ref_name }}.tar.gz
            lark-cli-extra-skills-${{ github.ref_name }}.zip
            lark-cli-extra-skills.tar.gz
            lark-cli-extra-skills.zip
